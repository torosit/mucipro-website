kind = "web"
previewPath = "/"
title = "Mucipro SAS"
version = "1.0.0"
id = "artifacts/mucipro"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21516

[services.development]
run = "pnpm --filter @workspace/mucipro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mucipro", "run", "build" ]
publicDir = "artifacts/mucipro/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21516"
BASE_PATH = "/"
